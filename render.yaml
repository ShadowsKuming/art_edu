# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: artbloom-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: artbloom-db
          property: connectionString
      - key: JWT_SECRET
        sync: false         # paste a random secret in Render dashboard
      - key: INVITE_CODE_1
        sync: false         # e.g. BLOOM-2026-A  — add INVITE_CODE_4, _5, … to expand
      - key: INVITE_CODE_2
        sync: false
      - key: INVITE_CODE_3
        sync: false
      - key: TEXTBOOK_ASSETS_URL
        sync: false
      - key: ARK_API_KEY
        sync: false
      - key: ARK_STORY_MODEL
        sync: false
      - key: ARK_CHAT_MODEL
        sync: false
      - key: ARK_VIDEO_MODEL
        sync: false
      - key: ARK_IMAGE_MODEL
        sync: false

databases:
  - name: artbloom-db
    databaseName: artbloom
    user: artbloom
    plan: free
    region: oregon
